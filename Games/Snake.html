<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    :root {
      --bg: #08150a;
      --panel: #102813;
      --panel-2: #17381c;
      --grid: #214f28;
      --text: #d8f7d9;
      --muted: #9ccca0;
      --snake: #6af14a;
      --snake-head: #b4ff7e;
      --food: #ff2d2d;
      --danger: #ffb347;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 15%, rgba(91, 165, 84, 0.18), transparent 35%),
        radial-gradient(circle at 80% 85%, rgba(157, 251, 112, 0.16), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .game-shell {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(160deg, var(--panel), var(--panel-2));
      border: 0;
      border-radius: 0;
      padding: clamp(0.5rem, 1.8vh, 1rem);
      box-shadow: none;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: 0.65rem;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      letter-spacing: 0.08em;
      font-size: clamp(1.2rem, 2.8vw, 1.7rem);
      text-transform: uppercase;
    }

    .board-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .stats {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(180, 255, 126, 0.3);
      border-radius: 999px;
      padding: 0.28rem 0.75rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .pill strong {
      color: var(--text);
      margin-left: 0.2rem;
    }

    canvas {
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      border: 2px solid rgba(180, 255, 126, 0.28);
      background: #0d220e;
      image-rendering: pixelated;
      display: block;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
    }

    button {
      background: #1f4a26;
      border: 1px solid rgba(180, 255, 126, 0.45);
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
    }

    button:hover {
      background: #2b6835;
    }

    .status {
      color: var(--danger);
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <div class="top">
      <h1>Snake</h1>
      <div class="stats">
        <div class="pill">Score<strong id="score">0</strong></div>
        <div class="pill">Best<strong id="best">0</strong></div>
        <div class="pill">Speed<strong id="speed">7</strong></div>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="board" width="480" height="480" aria-label="Snake game board"></canvas>
    </div>

    <div class="controls">
      <span>Move: Arrow keys or WASD | Pause: P or Space</span>
      <button id="restart" type="button">Restart</button>
    </div>
    <div class="status" id="status"></div>
  </main>

  <script>
    const GRID_SIZE = 24;
    const BASE_FPS = 7;
    const SPEED_STEP = 1;
    const SPEED_EVERY = 4;

    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const speedEl = document.getElementById("speed");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restart");

    let snake;
    let direction;
    let queuedDirection;
    let food;
    let score;
    let bestScore = Number(localStorage.getItem("snake-best") || 0);
    let gameOver;
    let paused;
    let lastTick = 0;

    bestEl.textContent = String(bestScore);

    function resetGame() {
      const start = Math.floor(GRID_SIZE / 2);
      snake = [
        { x: start, y: start },
        { x: start - 1, y: start },
        { x: start - 2, y: start }
      ];
      direction = { x: 1, y: 0 };
      queuedDirection = { x: 1, y: 0 };
      food = randomFood();
      score = 0;
      gameOver = false;
      paused = false;
      statusEl.textContent = "";
      updateHud();
      draw();
    }

    function randomFood() {
      let next;
      do {
        next = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
      } while (snake && snake.some((segment) => segment.x === next.x && segment.y === next.y));
      return next;
    }

    function updateHud() {
      const speed = BASE_FPS + Math.floor(score / SPEED_EVERY) * SPEED_STEP;
      scoreEl.textContent = String(score);
      speedEl.textContent = String(speed);
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("snake-best", String(bestScore));
        bestEl.textContent = String(bestScore);
      }
    }

    function setDirection(nextX, nextY) {
      if (gameOver) return;
      const isReverse = nextX === -direction.x && nextY === -direction.y;
      if (!isReverse) {
        queuedDirection = { x: nextX, y: nextY };
      }
    }

    function step() {
      if (gameOver || paused) {
        draw();
        return;
      }

      direction = queuedDirection;
      const head = snake[0];
      const next = { x: head.x + direction.x, y: head.y + direction.y };

      if (next.x < 0 || next.x >= GRID_SIZE || next.y < 0 || next.y >= GRID_SIZE) {
        endGame();
        return;
      }

      if (snake.some((segment) => segment.x === next.x && segment.y === next.y)) {
        endGame();
        return;
      }

      snake.unshift(next);

      if (next.x === food.x && next.y === food.y) {
        score += 1;
        food = randomFood();
        updateHud();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      statusEl.textContent = "Game over. Press Restart to play again.";
      draw();
    }

    function drawGrid() {
      const cell = canvas.width / GRID_SIZE;
      ctx.fillStyle = "#0f2a11";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(151, 231, 151, 0.14)";
      ctx.lineWidth = 1;
      for (let i = 1; i < GRID_SIZE; i += 1) {
        const p = i * cell;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function draw() {
      const cell = canvas.width / GRID_SIZE;
      drawGrid();

      ctx.fillStyle = "#ff2d2d";
      ctx.beginPath();
      const centerX = (food.x + 0.5) * cell;
      const centerY = (food.y + 0.5) * cell;
      ctx.arc(centerX, centerY, cell * 0.34, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((segment, index) => {
        const x = segment.x * cell;
        const y = segment.y * cell;
        ctx.fillStyle = index === 0 ? "#b4ff7e" : "#6af14a";
        ctx.fillRect(x + 2, y + 2, cell - 4, cell - 4);
      });

      if (paused && !gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#d8f7d9";
        ctx.textAlign = "center";
        ctx.font = "bold 34px Trebuchet MS";
        ctx.fillText("Paused", canvas.width / 2, canvas.height / 2);
      }
    }

    function tick(timestamp) {
      const speed = BASE_FPS + Math.floor(score / SPEED_EVERY) * SPEED_STEP;
      const stepMs = 1000 / speed;

      if (timestamp - lastTick >= stepMs) {
        lastTick = timestamp;
        step();
      }

      requestAnimationFrame(tick);
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === "p" || key === " ") {
        if (!gameOver) {
          paused = !paused;
          statusEl.textContent = paused ? "Paused" : "";
          draw();
        }
        return;
      }

      if (key === "arrowup" || key === "w") setDirection(0, -1);
      else if (key === "arrowdown" || key === "s") setDirection(0, 1);
      else if (key === "arrowleft" || key === "a") setDirection(-1, 0);
      else if (key === "arrowright" || key === "d") setDirection(1, 0);
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
      lastTick = performance.now();
    });

    resetGame();
    requestAnimationFrame(tick);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniVerse</title>
  <style>
    :root {
      --bg: #0a0e17;
      --fg: #eef3ff;
      --line: rgba(255, 255, 255, 0.16);
      --muted: #a8b2cc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 18% 14%, #1f3155 0%, transparent 40%), var(--bg);
      color: var(--fg);
      font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
      overflow-x: hidden;
    }
    .trail-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .trail-image {
      position: absolute;
      width: 92px;
      height: 92px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 12px 24px rgba(0,0,0,0.42);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.74) rotate(-8deg);
      transition: opacity 220ms ease, transform 220ms ease;
    }
    .trail-image.live {
      opacity: 0.92;
      transform: translate(-50%, -50%) scale(1) rotate(var(--rot));
    }
    main {
      position: relative;
      z-index: 2;
      width: min(980px, calc(100% - 40px));
      margin: 26px auto 36px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(10, 14, 24, 0.62);
      padding: 16px;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0; font-size: clamp(1.7rem, 4.3vw, 3rem); }
    p { margin: 10px 0 0; color: var(--muted); line-height: 1.6; }
    .back {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      padding: 0 12px;
      border-radius: 9px;
      color: #e3f5ff;
      text-decoration: none;
      border: 1px solid rgba(126, 222, 255, 0.45);
      background: rgba(126, 222, 255, 0.08);
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .gallery img { width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14); }
  </style>
</head>
<body>
  <div class="trail-layer" id="trailLayer" aria-hidden="true"></div>
  <main>
    <section class="panel">
      <a class="back" href="../demo.html">Back to Projects Hub</a>
      <h1>AniVerse</h1>
      <p>Cursor trail here only uses AniVerse visuals.</p>
      <div class="gallery">
        <img src="Main.png" alt="AniVerse main">
        <img src="Screenshot 2026-03-21 114705.png" alt="AniVerse screenshot">
        <img src="Screenshot 2026-03-21 115152.png" alt="AniVerse screenshot">
      </div>
    </section>
  </main>
  <script>
    const images = [
      "Main.png",
      "Screenshot 2026-03-21 114705.png",
      "Screenshot 2026-03-21 115152.png",
      "Screenshot 2026-03-21 115217.png",
      "Screenshot 2026-03-21 115252.png",
      "Screenshot 2026-03-21 115318.png",
      "Screenshot 2026-03-21 115339.png",
      "Screenshot 2026-03-21 115406.png",
      "Screenshot 2026-03-21 115443.png",
      "Screenshot 2026-03-21 115524.png"
    ];
    const layer = document.getElementById("trailLayer");
    let i = 0;
    let px = 0;
    let py = 0;
    function spawn(x, y) {
      const img = document.createElement("img");
      img.className = "trail-image";
      img.src = images[i % images.length];
      i += 1;
      img.alt = "";
      img.style.left = `${x}px`;
      img.style.top = `${y}px`;
      img.style.setProperty("--rot", `${(Math.random() - 0.5) * 20}deg`);
      layer.appendChild(img);
      requestAnimationFrame(() => img.classList.add("live"));
      setTimeout(() => {
        img.classList.remove("live");
        img.style.opacity = "0";
        setTimeout(() => img.remove(), 220);
      }, 900);
    }
    window.addEventListener("mousemove", (event) => {
      const d = Math.hypot(event.clientX - px, event.clientY - py);
      if (d > 14) {
        spawn(event.clientX, event.clientY);
        px = event.clientX;
        py = event.clientY;
      }
    });
  </script>
</body>
</html>
